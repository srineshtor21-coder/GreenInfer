<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <!-- Outer circuit ring with gaps -->
  <circle cx="24" cy="24" r="21" stroke="#00ffa0" stroke-width="1.5" stroke-dasharray="8 3" opacity="0.5"/>
  <!-- Inner dynamic ring -->
  <circle cx="24" cy="24" r="15" stroke="#00e5cc" stroke-width="1" opacity="0.3"/>
  <!-- Neural node center -->
  <circle cx="24" cy="24" r="5" fill="#00ffa0" opacity="0.9"/>
  <circle cx="24" cy="24" r="3" fill="#080d0e"/>
  <!-- Leaf-circuit arms radiating outward (6 directions) -->
  <!-- Top arm -->
  <line x1="24" y1="19" x2="24" y2="10" stroke="#00ffa0" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="24" cy="9" r="2" fill="#00ffa0" opacity="0.8"/>
  <!-- Top-right arm -->
  <line x1="27.6" y1="21.9" x2="33.7" y2="16.3" stroke="#00ffa0" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="35" cy="15" r="2" fill="#00ffa0" opacity="0.6"/>
  <!-- Bottom-right arm -->
  <line x1="27.6" y1="26.1" x2="33.7" y2="31.7" stroke="#00e5cc" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="35" cy="33" r="2" fill="#00e5cc" opacity="0.6"/>
  <!-- Bottom arm -->
  <line x1="24" y1="29" x2="24" y2="38" stroke="#00ffa0" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="24" cy="39" r="2" fill="#00ffa0" opacity="0.8"/>
  <!-- Bottom-left arm -->
  <line x1="20.4" y1="26.1" x2="14.3" y2="31.7" stroke="#00ffa0" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="13" cy="33" r="2" fill="#00ffa0" opacity="0.6"/>
  <!-- Top-left arm -->
  <line x1="20.4" y1="21.9" x2="14.3" y2="16.3" stroke="#00e5cc" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="13" cy="15" r="2" fill="#00e5cc" opacity="0.6"/>
  <!-- Small leaf arc top-right (energy direction indicator) -->
  <path d="M28 12 Q35 8 38 16" stroke="#00ffa0" stroke-width="1.2" stroke-linecap="round" fill="none" opacity="0.5"/>
  <!-- Small leaf arc bottom-left -->
  <path d="M20 36 Q13 40 10 32" stroke="#00ffa0" stroke-width="1.2" stroke-linecap="round" fill="none" opacity="0.5"/>
</svg>
